<body>

  <button id="modeToggle">🌙</button>
</header>

<section class="hero">
  <div class="hero-content">
    <h1><span id="typing"></span></h1>
    <p>Ultra Fast • Reliable • Affordable</p>
    <a href="#plans" class="btn">View Plans</a>
  </div>
  <div class="particles"></div>
</section>

<section class="plans" id="plans">
  <h2>Our Plans</h2>
  <div class="plan-container">

    <div class="plan-card">
      <h3>Basic</h3>
      <p>50 Mbps</p>

    <div class="plan-card">

      <p>100 Mbps</p>

    </div>

  </div>
</section>

<footer>
  <p>📞 7999631006 | 📧 jkbroadband07@gmail.com</p>
  <p>© 2026 JKBroadband</p>
</footer>

<a href="https://wa.me/917999631006" class="whatsapp" target="_blank">💬</a>

<script>
/* Loading Screen */
window.addEventListener("load", function(){
  document.getElementById("loader").style.display = "none";
});

/* Typing Animation */
const text = "High Speed Fiber Internet";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

/* Dark Mode Toggle */
const toggle = document.getElementById("modeToggle");
toggle.onclick = function(){
  document.body.classList.toggle("dark");
  toggle.innerHTML = document.body.classList.contains("dark") ? "☀️" : "🌙";
};
</script>

</body>
